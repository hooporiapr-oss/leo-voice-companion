<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GoStar GPS — La Voz PR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://elevenlabs.io/convai-widget/index.js" async></script>
<style>
  :root {
    --dark: #0a0a0f;
    --gold: #FFD700;
    --orange: #FF6B35;
    --teal: #00D9A5;
    --card-bg: rgba(18, 18, 28, 0.92);
    --gradient: linear-gradient(135deg, var(--gold), var(--orange));
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--dark);
    color: #fff;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    position: relative;
  }

  /* ── MAP ── */
  #map { position: absolute; inset: 0; z-index: 1; }
  .leaflet-tile-pane { filter: saturate(0.3) brightness(0.45) contrast(1.1); }

  /* ── TOP BAR ── */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
    pointer-events: none;
  }
  .top-bar > * { pointer-events: all; }

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--gradient);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 20px; color: var(--dark);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  }
  .brand-text {
    font-family: var(--font-display); font-size: 22px; letter-spacing: 2px;
    background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .brand-sub { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    background: var(--card-bg); border: 1px solid rgba(255,215,0,0.15);
    font-size: 12px; color: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teal); animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,217,165,0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,217,165,0); }
  }

  /* ── POI MARKERS ── */
  .poi-marker {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; border: 2px solid;
    box-shadow: 0 0 12px rgba(0,0,0,0.4);
  }
  .poi-safety { background: rgba(255,70,70,0.9); border-color: #ff4646; }
  .poi-culture { background: rgba(0,217,165,0.9); border-color: var(--teal); }
  .poi-food { background: rgba(255,215,0,0.9); border-color: var(--gold); }
  .poi-event { background: rgba(255,107,53,0.9); border-color: var(--orange); }

  .user-marker {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold); border: 3px solid #fff;
    box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.2);
    animation: user-pulse 2s infinite;
  }
  @keyframes user-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 0 0 rgba(255,215,0,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 0 20px rgba(255,215,0,0); }
  }

  /* ── NEARBY CHIPS ── */
  .nearby-bar {
    position: fixed; top: 70px; left: 12px; right: 12px;
    z-index: 1000; display: flex; gap: 8px;
    overflow-x: auto; padding: 4px 0; scrollbar-width: none;
  }
  .nearby-bar::-webkit-scrollbar { display: none; }
  .nearby-chip {
    flex-shrink: 0; padding: 8px 14px; border-radius: 14px;
    background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px); font-size: 12px;
    color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .nearby-chip:hover { border-color: var(--gold); color: #fff; }
  .nearby-chip .chip-icon { font-size: 14px; }
  .nearby-chip .chip-dist { color: var(--teal); font-weight: 600; font-size: 11px; }

  /* ── PROXIMITY ALERT ── */
  .proximity-alert {
    position: fixed; bottom: 90px; left: 12px; right: 12px;
    z-index: 1000; padding: 14px 18px; border-radius: 16px;
    background: var(--card-bg); border: 1px solid rgba(255,215,0,0.15);
    backdrop-filter: blur(16px);
    font-size: 14px; line-height: 1.5;
    animation: alertIn 0.4s ease-out;
    display: none;
  }
  .proximity-alert.active { display: block; }
  .proximity-alert .alert-name {
    font-family: var(--font-display); font-size: 11px;
    letter-spacing: 1.5px; color: var(--gold); margin-bottom: 4px;
  }
  .proximity-alert .alert-text { color: rgba(255,255,255,0.85); }
  .proximity-alert .location-tag {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 6px; padding: 3px 8px; border-radius: 8px;
    background: rgba(0,217,165,0.1); border: 1px solid rgba(0,217,165,0.2);
    font-size: 10px; color: var(--teal);
  }
  @keyframes alertIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SPLASH ── */
  .splash-overlay {
    position: fixed; inset: 0; z-index: 2000; background: var(--dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s, visibility 0.6s;
  }
  .splash-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-logo {
    width: 80px; height: 80px; border-radius: 24px;
    background: var(--gradient);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 38px; color: var(--dark);
    margin-bottom: 20px; box-shadow: 0 0 60px rgba(255,215,0,0.3);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .splash-title {
    font-family: var(--font-display); font-size: 42px; letter-spacing: 4px;
    background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .splash-sub { color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
  .splash-features { display: flex; gap: 24px; margin-bottom: 40px; }
  .splash-feat { text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; }
  .splash-feat-icon { font-size: 24px; margin-bottom: 6px; }
  .start-btn {
    padding: 16px 48px; border-radius: 30px; border: none;
    background: var(--gradient); color: var(--dark);
    font-family: var(--font-display); font-size: 18px; letter-spacing: 2px;
    cursor: pointer; box-shadow: 0 0 30px rgba(255,215,0,0.3); transition: all 0.3s;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,215,0,0.5); }

  /* ── ELEVENLABS WIDGET POSITION ── */
  elevenlabs-convai {
    position: fixed !important;
    bottom: 20px !important;
    right: 16px !important;
    z-index: 1500 !important;
  }
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div class="splash-overlay" id="splash">
  <div class="splash-logo">G</div>
  <div class="splash-title">GOSTAR</div>
  <div class="splash-sub">Tu Portal a Puerto Rico</div>
  <div class="splash-features">
    <div class="splash-feat"><div class="splash-feat-icon">&#128506;&#65039;</div><div>GPS Intelligence</div></div>
    <div class="splash-feat"><div class="splash-feat-icon">&#127908;</div><div>Voice Guide</div></div>
    <div class="splash-feat"><div class="splash-feat-icon">&#127477;&#127479;</div><div>100% Boricua</div></div>
  </div>
  <button class="start-btn" onclick="startApp()">COMENZAR</button>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="brand">
    <div class="brand-icon">G</div>
    <div>
      <div class="brand-text">GOSTAR</div>
      <div class="brand-sub">La Voz PR</div>
    </div>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Localizando...</span>
  </div>
</div>

<!-- NEARBY CHIPS -->
<div class="nearby-bar" id="nearbyBar"></div>

<!-- MAP -->
<div id="map"></div>

<!-- PROXIMITY ALERT -->
<div class="proximity-alert" id="proximityAlert">
  <div class="alert-name">GOSTAR</div>
  <div class="alert-text" id="alertText"></div>
  <div class="location-tag" id="alertLocation"></div>
</div>

<!-- ELEVENLABS GOSTAR VOICE -->
<elevenlabs-convai agent-id="agent_5801kjdgm1zwe65843rj9r29zmj1"></elevenlabs-convai>

<script>
// ═══════════════════════════════════════════════════
// GOSTAR GPS — La Voz PR
// Map + POIs + ElevenLabs Voice
// GoStar Digital LLC
// ═══════════════════════════════════════════════════

// ── STATE ──
var map, userMarker, userLat, userLng;
var announcedPOIs = {};
var alertTimeout = null;
var POI_DB = [];

// ══════════════════════════════════════
// POINTS OF INTEREST
// ══════════════════════════════════════

function getDefaultPOIs() {
  return [
    { id:"morro", name:"Castillo San Felipe del Morro", lat:18.4706, lng:-66.1239, type:"culture", icon:"\ud83c\udff0", desc:"Fortaleza del siglo XVI, Patrimonio de la UNESCO. M\u00e1s de 400 a\u00f1os defendiendo la isla." },
    { id:"sanjuangate", name:"Puerta de San Juan", lat:18.4644, lng:-66.1198, type:"culture", icon:"\ud83d\udeaa", desc:"Entrada hist\u00f3rica a la ciudad amurallada del siglo XVI." },
    { id:"fortaleza", name:"La Fortaleza", lat:18.4652, lng:-66.1186, type:"culture", icon:"\ud83c\udfdb\ufe0f", desc:"Mansi\u00f3n ejecutiva del Gobernador \u2014 la m\u00e1s antigua en las Am\u00e9ricas." },
    { id:"labomba", name:"La Bombonera", lat:18.4656, lng:-66.1167, type:"food", icon:"\ud83c\udf7d\ufe0f", desc:"Restaurante ic\u00f3nico desde 1902. Mallorcas y caf\u00e9 con leche legendarios." },
    { id:"placita", name:"La Placita de Santurce", lat:18.4489, lng:-66.0594, type:"food", icon:"\ud83c\udfb6", desc:"Mercado de d\u00eda, fiesta de noche. La rumba m\u00e1s famosa de San Juan." },
    { id:"school1", name:"Zona Escolar - Calle del Cristo", lat:18.4648, lng:-66.1180, type:"safety", icon:"\u26a0\ufe0f", desc:"\u00a1Zona escolar activa! Velocidad m\u00e1xima 15 MPH. Multas duplicadas." },
    { id:"coliseo", name:"Coliseo de Puerto Rico", lat:18.4271, lng:-66.0612, type:"event", icon:"\ud83c\udfae", desc:"El Choliseo \u2014 potencial sede GAMERGY 2026. 18,000+ capacidad." }
  ];
}

async function loadPOIData() {
  try {
    var response = await fetch("./poi-data.json");
    if (response.ok) {
      var data = await response.json();
      var raw = data.pois || data;
      POI_DB = raw.filter(function(p) { return p.active !== false; });
      console.log("Loaded " + POI_DB.length + " POIs from poi-data.json");
      return;
    }
  } catch (e) {
    console.log("No poi-data.json, using defaults");
  }
  POI_DB = getDefaultPOIs();
  console.log("Loaded " + POI_DB.length + " default POIs");
}

// ══════════════════════════════════════
// MAP
// ══════════════════════════════════════

function initMap() {
  userLat = 18.4655;
  userLng = -66.1180;

  map = L.map("map", {
    center: [userLat, userLng], zoom: 16,
    zoomControl: false, attributionControl: false
  });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 19
  }).addTo(map);

  POI_DB.forEach(function(poi) {
    var marker = L.marker([poi.lat, poi.lng], {
      icon: L.divIcon({
        className: "",
        html: '<div class="poi-marker poi-' + poi.type + '">' + poi.icon + '</div>',
        iconSize: [32, 32], iconAnchor: [16, 16]
      })
    }).addTo(map);

    marker.on("click", function() {
      map.flyTo([poi.lat, poi.lng], 17, { duration: 1 });
      showProximityAlert(poi);
    });
  });

  userMarker = L.marker([userLat, userLng], {
    icon: L.divIcon({
      className: "", html: '<div class="user-marker"></div>',
      iconSize: [20, 20], iconAnchor: [10, 10]
    })
  }).addTo(map);

  updateNearbyChips();
  startGPS();
}

// ── GPS ──
function startGPS() {
  if ("geolocation" in navigator) {
    navigator.geolocation.watchPosition(
      function(pos) {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        userMarker.setLatLng([userLat, userLng]);
        document.getElementById("statusText").textContent = "\ud83c\udfa4 GoStar + GPS";
        document.getElementById("statusDot").style.background = "var(--gold)";
        updateNearbyChips();
        checkProximityAlerts();
      },
      function() {
        document.getElementById("statusText").textContent = "\ud83c\udfa4 GoStar + Demo";
        simulateMovement();
      },
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  } else {
    simulateMovement();
  }
}

// ── SIMULATE MOVEMENT ──
var simStep = 0;
var simPath = [
  [18.4655, -66.1180], [18.4658, -66.1185], [18.4662, -66.1190],
  [18.4665, -66.1195], [18.4668, -66.1198], [18.4652, -66.1186],
  [18.4648, -66.1180], [18.4644, -66.1198], [18.4638, -66.1175],
  [18.4656, -66.1167], [18.4700, -66.1230], [18.4706, -66.1239]
];

function simulateMovement() {
  document.getElementById("statusText").textContent = "\ud83c\udfa4 GoStar + Demo";
  setInterval(function() {
    if (simStep < simPath.length) {
      userLat = simPath[simStep][0];
      userLng = simPath[simStep][1];
      userMarker.setLatLng([userLat, userLng]);
      map.panTo([userLat, userLng], { animate: true, duration: 1.5 });
      updateNearbyChips();
      checkProximityAlerts();
      simStep++;
    } else {
      simStep = 0;
      announcedPOIs = {};
    }
  }, 8000);
}

// ── PROXIMITY ──
function checkProximityAlerts() {
  var nearby = getNearbyPOIs(0.003);
  for (var i = 0; i < nearby.length; i++) {
    var poi = nearby[i];
    if (!announcedPOIs[poi.id]) {
      announcedPOIs[poi.id] = true;
      (function(p) {
        setTimeout(function() { showProximityAlert(p); }, 1500);
      })(poi);
    }
  }
}

function showProximityAlert(poi) {
  var el = document.getElementById("proximityAlert");
  var text = document.getElementById("alertText");
  var loc = document.getElementById("alertLocation");
  text.textContent = poi.desc;
  loc.innerHTML = "\ud83d\udccd " + poi.name;
  el.classList.add("active");
  if (alertTimeout) clearTimeout(alertTimeout);
  alertTimeout = setTimeout(function() { el.classList.remove("active"); }, 8000);
}

// ── NEARBY ──
function getNearbyPOIs(radius) {
  radius = radius || 0.008;
  return POI_DB
    .map(function(poi) {
      var dist = Math.sqrt(Math.pow(poi.lat - userLat, 2) + Math.pow(poi.lng - userLng, 2));
      return { id: poi.id, name: poi.name, lat: poi.lat, lng: poi.lng, type: poi.type, icon: poi.icon, desc: poi.desc, dist: dist };
    })
    .filter(function(poi) { return poi.dist < radius; })
    .sort(function(a, b) { return a.dist - b.dist; });
}

function updateNearbyChips() {
  var nearby = getNearbyPOIs(0.015);
  var bar = document.getElementById("nearbyBar");
  bar.innerHTML = nearby.slice(0, 6).map(function(poi) {
    var distMeters = Math.round(poi.dist * 111000);
    var distLabel = distMeters > 999 ? (distMeters/1000).toFixed(1) + "km" : distMeters + "m";
    var shortName = poi.name.length > 20 ? poi.name.substring(0,20) + "..." : poi.name;
    return '<div class="nearby-chip" onclick="chipTap(\'' + poi.id + '\')">' +
      '<span class="chip-icon">' + poi.icon + '</span>' +
      '<span>' + shortName + '</span>' +
      '<span class="chip-dist">' + distLabel + '</span></div>';
  }).join("");
}

function chipTap(poiId) {
  var poi = POI_DB.find(function(p) { return p.id === poiId; });
  if (!poi) return;
  map.flyTo([poi.lat, poi.lng], 17, { duration: 1 });
  showProximityAlert(poi);
}

// ══════════════════════════════════════
// START
// ══════════════════════════════════════

async function startApp() {
  document.getElementById("splash").classList.add("hidden");
  await loadPOIData();
  initMap();
}
</script>
</body>
</html>
