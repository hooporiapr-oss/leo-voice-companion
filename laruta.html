<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Ruta™ — La Voz PR</title>
<meta name="description" content="Ask La Voz about any spot in Puerto Rico. AI guide covering all 78 municipalities.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;
  --bg2:#F2F1ED;
  --card:#FFFFFF;
  --text:#1A1A1A;
  --text2:#4A4A4A;
  --text3:#8A8A8A;
  --accent:#C45D2C;
  --accent2:#D4A053;
  --accent-light:rgba(196,93,44,.08);
  --teal:#1A7A6A;
  --teal-light:rgba(26,122,106,.08);
  --border:#E8E7E3;
  --border2:#D8D7D3;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(0,0,0,.08);
  --radius:20px;
  --radius-sm:12px;
  --radius-pill:50px;
}
html,body{height:100%;margin:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

.app{display:flex;flex-direction:column;height:100%;max-width:720px;margin:0 auto;position:relative;z-index:1}

.top-bar{
  position:sticky;top:0;z-index:10;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(250,250,248,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.back-link{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text3);text-decoration:none;transition:color .3s;font-weight:500}
.back-link:hover{color:var(--accent)}
.top-center{display:flex;flex-direction:column;align-items:center}
.top-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
.top-sub{font-size:.65rem;color:var(--teal);font-weight:600;letter-spacing:.5px;text-transform:uppercase}


.muni-chip{display:none;margin:0 auto;padding:6px 16px;background:var(--accent-light);border:1px solid rgba(196,93,44,.15);border-radius:var(--radius-pill);font-size:.72rem;font-weight:600;color:var(--accent);text-align:center}
.muni-chip.show{display:inline-block}
.safari-tip{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 16px;background:rgba(26,122,106,.1);border-bottom:1px solid rgba(26,122,106,.15);font-size:.72rem;color:var(--teal);font-weight:500;text-align:center}

.chat-area{
  flex:1;overflow-y:auto;
  padding:24px 20px 16px;
  display:flex;flex-direction:column;gap:24px;
  scrollbar-width:none;
  position:relative;
}
.chat-bg{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:url('https://raw.githubusercontent.com/hooporiapr-oss/leo-voice-companion/main/002.png') center/cover no-repeat;
  z-index:0;
}
.chat-bg::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
}
.chat-area::-webkit-scrollbar{display:none}

.msg{display:flex;gap:12px;max-width:100%;animation:msgIn .35s ease both;position:relative;z-index:1}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;letter-spacing:.5px;
}
.msg.bot .msg-avatar{background:var(--teal-light);color:var(--teal)}
.msg.user .msg-avatar{background:var(--accent-light);color:var(--accent)}
.msg-content{flex:1;min-width:0}
.msg-name{font-size:.7rem;font-weight:600;letter-spacing:.3px;margin-bottom:4px;text-transform:uppercase}
.msg.bot .msg-name{color:var(--teal)}
.msg.user .msg-name{color:var(--accent);text-align:right}
.msg-bubble{font-size:1.05rem;line-height:1.72;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.msg.user .msg-bubble{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 4px var(--radius);
  padding:14px 18px;text-align:right;box-shadow:var(--shadow);
}
.msg.bot .msg-bubble{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) var(--radius) 4px;
  padding:14px 18px;box-shadow:var(--shadow);
}
.listen-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-pill);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.listen-btn:hover{background:#B5522A;transform:scale(1.02)}
.listen-btn.playing{background:var(--teal)}
.listen-btn.loading{opacity:.5;pointer-events:none}

.typing-wrap{display:flex;gap:12px;animation:msgIn .35s ease both;position:relative;z-index:1}
.typing-dots{display:flex;gap:5px;padding:8px 0}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--border2);animation:typePulse 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typePulse{0%,100%{opacity:.3;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}

.input-area{
  position:sticky;bottom:0;
  padding:12px 16px 20px;
  background:rgba(250,250,248,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}
.input-bar{
  display:flex;align-items:center;gap:0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.input-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,93,44,.1)}
.chat-mic{padding:14px 16px;background:transparent;border:none;font-size:1.4rem;cursor:pointer;opacity:.4;transition:all .2s;flex-shrink:0}
.chat-mic:hover{opacity:.7}
.chat-mic.listening{opacity:1;color:var(--accent);animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.chat-input{flex:1;padding:15px 4px 15px 0;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:400}
.chat-input::placeholder{color:var(--text3);font-weight:400}
.chat-send{width:36px;height:36px;margin:6px 6px 6px 0;background:var(--accent);border:none;color:#fff;font-size:1.1rem;cursor:pointer;transition:all .2s;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send:hover{background:#B5522A;transform:scale(1.05)}
.chat-send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.disc{text-align:center;padding:4px 16px 0}
.disc p{font-size:.62rem;color:var(--text3);line-height:1.5;max-width:440px;margin:0 auto}

@media(max-width:768px){.app{max-width:100%}.msg-bubble{font-size:1rem}.chat-input{font-size:1rem}.top-bar{padding:12px 16px}}
@media(min-width:769px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">
  <div class="chat-bg"></div>
  <div class="top-bar">
    <a href="index.html" class="back-link">&#8592; Home</a>
    <div class="top-center">
      <div class="top-title">La Ruta™</div>
      <div class="top-sub">Talk with us from La Cordillera</div>
    </div>
    <div style="width:50px"></div>
  </div>
  <div class="safari-tip" id="safariTip">
    📱 Best experience on mobile Safari
    <button onclick="document.getElementById('safariTip').style.display='none'" style="background:none;border:none;color:inherit;font-size:1rem;cursor:pointer;padding:0 0 0 8px;opacity:.6">&times;</button>
  </div>
  <div style="text-align:center;padding:12px 0 0"><div class="muni-chip" id="muniChip"></div></div>
  <div class="chat-area" id="chatMessages"></div>
  <div class="input-area">
    <div class="input-bar">
      <button class="chat-mic" id="chatMic" onclick="toggleMic()">&#127908;</button>
      <input type="text" class="chat-input" id="chatInput" placeholder="Ask La Voz anything..." autocomplete="off">
      <button class="chat-send" id="chatSend" onclick="sendMessage()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg></button>
    </div>
    <div class="disc">
      <p>GoStar Digital LLC &copy; 2026 &nbsp;|&nbsp; <a href="privacy.html" style="color:var(--text3);text-decoration:none">Privacy</a> &nbsp;|&nbsp; <a href="terms.html" style="color:var(--text3);text-decoration:none">Terms</a></p>
    </div>
  </div>
</div>
<script>
var API_BASE='https://lavozpr-api.onrender.com',chatHistory=[],muniParam=null;
var urlParams=new URLSearchParams(window.location.search);muniParam=urlParams.get('muni');

function initPage(){
  var w;
  if(muniParam){
    var chip=document.getElementById('muniChip');chip.textContent=muniParam+', Puerto Rico';chip.classList.add('show');
    w="Wepa! Welcome to La Ruta\u2122! I'm La Voz \u2014 tu gu\u00eda for "+muniParam+", Puerto Rico. I know this pueblo inside and out \u2014 la historia, the food, las playas, the culture, todo. What do you want to know about "+muniParam+"?";
  }else{
    w="Wepa! Welcome to La Ruta\u2122! I'm La Voz \u2014 tu gu\u00eda to all 78 municipios of Puerto Rico. Ask me anything about esta isla \u2014 history, comida, beaches, cultura, where to live \u2014 lo s\u00e9 todo. What do you want to explore?";
  }
  addMessage('bot',w);
}

function sendMessage(){
  var input=document.getElementById('chatInput'),text=input.value.trim();if(!text)return;
  addMessage('user',text);input.value='';chatHistory.push({role:'user',content:text});
  var typing=showTyping();document.getElementById('chatSend').disabled=true;
  fetch(API_BASE+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory,municipality:muniParam})})
  .then(function(r){return r.json();})
  .then(function(d){
    removeTyping(typing);
    var reply=d.reply||(d.content&&d.content[0]&&d.content[0].text)||null;
    if(reply){addMessage('bot',reply,true);chatHistory.push({role:'assistant',content:reply});}
    else{addMessage('bot','Ay bendito, I had trouble with that. Try again!');}
    document.getElementById('chatSend').disabled=false;
  })
  .catch(function(){removeTyping(typing);addMessage('bot','Connection error. Intenta de nuevo!');document.getElementById('chatSend').disabled=false;});
}

var currentAudio=null;

function addMessage(role,text,showListen){
  var c=document.getElementById('chatMessages');
  var msg=document.createElement('div');msg.className='msg '+role;
  var avatar=document.createElement('div');avatar.className='msg-avatar';
  avatar.textContent=role==='user'?('Y'):'LV';
  var content=document.createElement('div');content.className='msg-content';
  var name=document.createElement('div');name.className='msg-name';
  name.textContent=role==='user'?('You'):'La Voz';
  var bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent=text;
  content.appendChild(name);content.appendChild(bubble);
  if(showListen&&role==='bot'){
    var btn=document.createElement('button');btn.className='listen-btn';
    btn.innerHTML='&#128264; '+('Listen / Escuchar');
    btn.onclick=function(){playVoice(text,btn);};
    content.appendChild(btn);
  }
  msg.appendChild(avatar);msg.appendChild(content);
  c.appendChild(msg);c.scrollTop=c.scrollHeight;
}

function playVoice(text,btn){
  if(currentAudio){currentAudio.pause();currentAudio=null;document.querySelectorAll('.listen-btn.playing').forEach(function(b){b.classList.remove('playing');b.innerHTML='&#128264; '+('Listen / Escuchar');});}
  
  // Warm up audio at tap time for Safari
  var audio=new Audio();
  audio.setAttribute('playsinline','');
  // Create silent audio context to unlock Safari audio
  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();ctx.resume();var src=ctx.createMediaElementSource(audio);src.connect(ctx.destination);}catch(e){}
  currentAudio=audio;
  
  btn.classList.add('loading');btn.innerHTML='&#9203; '+('Loading...');
  fetch(API_BASE+'/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})})
  .then(function(r){if(!r.ok)throw new Error('TTS error');return r.blob();})
  .then(function(blob){
    var url=URL.createObjectURL(blob);
    audio.src=url;
    audio.onloadeddata=function(){
      btn.classList.remove('loading');btn.classList.add('playing');
      btn.innerHTML='&#128264; '+('Playing...');
      audio.play();
    };
    audio.onended=function(){btn.classList.remove('playing');btn.innerHTML='&#128264; '+('Listen / Escuchar');currentAudio=null;URL.revokeObjectURL(url);};
    audio.onerror=function(){btn.classList.remove('loading');btn.classList.remove('playing');btn.innerHTML='&#128264; '+('Listen / Escuchar');currentAudio=null;};
    audio.load();
  })
  .catch(function(){btn.classList.remove('loading');btn.innerHTML='&#10060; Error';setTimeout(function(){btn.innerHTML='&#128264; '+('Listen / Escuchar');},2000);currentAudio=null;});
}

function showTyping(){
  var c=document.getElementById('chatMessages');
  var wrap=document.createElement('div');wrap.className='typing-wrap';
  var avatar=document.createElement('div');avatar.className='msg-avatar';
  avatar.style.background='var(--teal-light)';avatar.style.color='var(--teal)';avatar.textContent='LV';
  var dots=document.createElement('div');dots.className='typing-dots';
  dots.innerHTML='<span></span><span></span><span></span>';
  wrap.appendChild(avatar);wrap.appendChild(dots);
  c.appendChild(wrap);c.scrollTop=c.scrollHeight;return wrap;
}
function removeTyping(el){if(el&&el.parentNode)el.parentNode.removeChild(el);}

var isRecording=false,mediaRecorder=null,audioChunks=[];
function toggleMic(){
  var mic=document.getElementById('chatMic'),input=document.getElementById('chatInput');
  if(isRecording&&mediaRecorder){mediaRecorder.stop();return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioChunks=[];
    mediaRecorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4'});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      stream.getTracks().forEach(function(t){t.stop();});
      mic.classList.remove('listening');isRecording=false;
      if(audioChunks.length===0){input.placeholder='Ask La Voz anything...';return;}
      var blob=new Blob(audioChunks,{type:mediaRecorder.mimeType});
      input.placeholder='Transcribing...';input.value='';
      var fd=new FormData();fd.append('audio',blob,'audio.webm');
      fetch(API_BASE+'/api/transcribe',{method:'POST',body:fd})
      .then(function(r){return r.json();})
      .then(function(d){input.placeholder='Ask La Voz anything...';if(d.text&&d.text.trim()){input.value=d.text.trim();sendMessage();}})
      .catch(function(){input.placeholder='Ask La Voz anything...';input.value='';});
    };
    mediaRecorder.start();mic.classList.add('listening');
    input.placeholder='Listening... tap to stop';
    isRecording=true;
    setTimeout(function(){if(isRecording&&mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();}},30000);
  }).catch(function(){alert('Microphone access denied.');});
}

document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

initPage();
</script>
</body>
</html>
